<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5aef76" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Currency symbols -->
  <g transform="translate(380, 160)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="50" y="68" text-anchor="middle" fill="#0c2756" font-size="40" font-family="Inter, sans-serif" font-weight="700">$</text>
  </g>
  <g transform="translate(510, 160)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="50" y="68" text-anchor="middle" fill="#203a7f" font-size="40" font-family="Inter, sans-serif" font-weight="700">€</text>
  </g>
  <g transform="translate(640, 160)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="50" y="68" text-anchor="middle" fill="#5aef76" font-size="40" font-family="Inter, sans-serif" font-weight="700">£</text>
  </g>
  <g transform="translate(770, 160)">
    <rect x="0" y="0" width="100" height="100" rx="20" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="50" y="68" text-anchor="middle" fill="#e13f3f" font-size="40" font-family="Inter, sans-serif" font-weight="700">¥</text>
  </g>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" fill="#0c2756" font-size="42" font-family="Inter, sans-serif" font-weight="600">Multi-Currency Support</text>
  <text x="600" y="430" text-anchor="middle" fill="#52525B" font-size="20" font-family="Inter, sans-serif">Collect in any currency, track in yours</text>
  <!-- Decorative -->
  <circle cx="200" cy="150" r="4" fill="#5aef76" opacity="0.3"/>
  <circle cx="1000" cy="500" r="6" fill="#203a7f" opacity="0.2"/>
</svg>
