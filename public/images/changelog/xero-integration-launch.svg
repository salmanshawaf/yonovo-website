<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5aef76" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Connection graphic -->
  <g transform="translate(600, 200)">
    <!-- Yonovo circle -->
    <circle cx="-120" cy="0" r="50" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="-120" y="6" text-anchor="middle" fill="#0c2756" font-size="14" font-family="Inter, sans-serif" font-weight="700">Yonovo</text>
    <!-- Xero circle -->
    <circle cx="120" cy="0" r="50" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="120" y="6" text-anchor="middle" fill="#13B5EA" font-size="16" font-family="Inter, sans-serif" font-weight="700">Xero</text>
    <!-- Connection line -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#5aef76" stroke-width="3" stroke-dasharray="8 4"/>
    <!-- Checkmark in center -->
    <circle cx="0" cy="0" r="18" fill="#5aef76"/>
    <polyline points="-6,0 -2,5 8,-5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" fill="#0c2756" font-size="42" font-family="Inter, sans-serif" font-weight="600">Xero Integration Launch</text>
  <text x="600" y="430" text-anchor="middle" fill="#52525B" font-size="20" font-family="Inter, sans-serif">Connect in minutes, automate collections instantly</text>
  <!-- Decorative -->
  <circle cx="200" cy="150" r="4" fill="#5aef76" opacity="0.3"/>
  <circle cx="1000" cy="500" r="6" fill="#203a7f" opacity="0.2"/>
  <circle cx="180" cy="480" r="5" fill="#e13f3f" opacity="0.15"/>
</svg>
