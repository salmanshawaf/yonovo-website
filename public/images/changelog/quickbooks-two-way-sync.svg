<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5aef76" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Sync arrows -->
  <g transform="translate(600, 220)">
    <!-- Left box -->
    <rect x="-200" y="-40" width="120" height="80" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="-140" y="10" text-anchor="middle" fill="#0c2756" font-size="16" font-family="Inter, sans-serif" font-weight="600">Yonovo</text>
    <!-- Right box -->
    <rect x="80" y="-40" width="120" height="80" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="140" y="10" text-anchor="middle" fill="#2CA01C" font-size="14" font-family="Inter, sans-serif" font-weight="600">QuickBooks</text>
    <!-- Arrow right -->
    <path d="M-60 -10 L60 -10" stroke="#5aef76" stroke-width="2.5" fill="none"/>
    <polygon points="60,-10 50,-16 50,-4" fill="#5aef76"/>
    <!-- Arrow left -->
    <path d="M60 10 L-60 10" stroke="#203a7f" stroke-width="2.5" fill="none"/>
    <polygon points="-60,10 -50,4 -50,16" fill="#203a7f"/>
  </g>
  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" fill="#0c2756" font-size="42" font-family="Inter, sans-serif" font-weight="600">QuickBooks Two-Way Sync</text>
  <text x="600" y="450" text-anchor="middle" fill="#52525B" font-size="20" font-family="Inter, sans-serif">Changes flow both ways, automatically</text>
  <!-- Decorative -->
  <circle cx="180" cy="480" r="5" fill="#e13f3f" opacity="0.15"/>
  <circle cx="1020" cy="160" r="3" fill="#5aef76" opacity="0.25"/>
</svg>
